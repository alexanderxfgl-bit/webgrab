repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check src/ tests/ --fix
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format src/ tests/
        language: system
        pass_filenames: false

      - id: ty
        name: ty type check
        entry: uv run ty check src/webgrab/__init__.py
        language: system
        pass_filenames: false

      - id: unit-tests
        name: unit tests (90% coverage)
        entry: uv run pytest tests/test_webgrab.py --cov=src --cov-fail-under=90 -n auto
        language: system
        pass_filenames: false
        stages: [commit]
