name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: ruff lint
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format src/ tests/ --check
      - name: ty type check
        run: uv run ty check src/webgrab/__init__.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: unit tests with coverage
        run: uv run pytest tests/test_webgrab.py -v --cov=src --cov-fail-under=90 --cov-report=term-missing --cov-report=xml -n auto
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: integration tests (easy + medium)
        run: uv run pytest tests/test_integration.py -v -m "not slow" -n auto --no-header -q || true

  slow-tests:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: slow / hard URL tests
        run: uv run pytest tests/test_integration.py -v -m "slow" -n auto --no-header -q || true
