name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: ruff lint
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format src/ tests/ --check
      - name: ty type check
        run: uv run ty check src/webgrab/__init__.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: unit tests with coverage
        run: uv run pytest tests/ -m "not local" --cov=src --cov-fail-under=90 --cov-report=term-missing --cov-report=xml -n auto
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: integration tests (CI-safe only)
        run: uv run pytest tests/test_integration.py -v -m "not local" -n auto

  mcp:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: install chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          echo "CHROME_BIN=$(which chromium-browser)" >> $GITHUB_ENV
      - run: uv sync --extra dev
      - name: MCP stdio integration tests
        run: uv run pytest tests/test_mcp_stdio.py -v -n auto
      - name: install via uvx from git
        run: uvx --from git+https://github.com/alexanderxfgl-bit/webgrab.git webgrab --help
      - name: uvx fetch test
        run: uvx --from git+https://github.com/alexanderxfgl-bit/webgrab.git webgrab https://example.com --format text
