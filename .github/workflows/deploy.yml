name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for all CI checks to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-regexp: lint|test|mcp|integration
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: wait-for-ci
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VM_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${{ secrets.VM_USER }}@${{ secrets.VM_IP }}" << 'DEPLOY'
            set -e
            # Ensure basic tools
            if ! command -v git &>/dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq git
            fi
            # Clone repo
            if [ ! -d ~/webgrab ]; then
              git clone https://github.com/alexanderxfgl-bit/webgrab.git ~/webgrab
            fi
            cd ~/webgrab
            git fetch origin main
            git reset --hard origin/main
            # Ensure uv is available
            if ! command -v uv &>/dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
            fi
            export PATH="$HOME/.local/bin:$PATH"
            # Ensure venv exists
            if [ ! -d ~/webgrab-venv ]; then
              uv venv ~/webgrab-venv
            fi
            source ~/webgrab-venv/bin/activate
            uv pip install -e .
            # Update systemd service to point to new server file + set FlareSolverr env var
            sudo sed -i 's|/home/alexanderxfgl/webgrab_http_server.py|/home/alexanderxfgl/webgrab/src/webgrab/server_http.py|' /etc/systemd/system/webgrab.service
            # Ensure FlareSolverr env var is set
            if ! grep -q 'WEBGRAB_FLARESOLVERR_URL' /etc/systemd/system/webgrab.service; then
              sudo sed -i '/ExecStart=/i Environment=WEBGRAB_FLARESOLVERR_URL=http://104.154.30.199:8191/v1' /etc/systemd/system/webgrab.service
              sudo sed -i '/ExecStart=/i Environment=WEBGRAB_CHROME=/usr/local/bin/chrome' /etc/systemd/system/webgrab.service
            fi
            sudo systemctl daemon-reload
            sudo systemctl restart webgrab
            sleep 2
            sudo systemctl status webgrab --no-pager
          DEPLOY

      - name: Verify health
        run: |
          sleep 3
          curl -sf "http://${{ secrets.VM_IP }}:8721/health" && echo "OK" || (echo "FAIL: health check failed" && exit 1)
