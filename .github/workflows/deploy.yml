name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []  # runs alongside CI, not dependent on it
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'DEPLOY'
            set -e
            cd ~/webgrab
            git pull origin main
            source ~/webgrab-venv/bin/activate
            uv pip install -e .
            sudo systemctl restart webgrab
            sleep 2
            sudo systemctl status webgrab --no-pager
          DEPLOY

      - name: Verify health
        run: |
          sleep 3
          curl -sf http://${{ secrets.VM_IP }}:8721/health && echo "OK" || echo "WARN: health check failed"
